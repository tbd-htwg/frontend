name: Deploy Frontend to Cloud Storage and CDN

on:
  workflow_dispatch:
#     inputs:
#       environment:
#         type: environment
#         description: Select the environment to deploy to
#         required: true
#         default: 'develop'
#   push:
#     branches: ["main", "staging", "develop"]

############################################################################
# WORKFLOW PERMISSIONS AND GLOBAL VARIABLES
############################################################################

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: gke-dev
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      FRONTEND_BUCKET: ${{ vars.GCP_FRONTEND_BUCKET }}
      URL_MAP_NAME: ${{ vars.GCP_FRONTEND_URL_MAP }}
      WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      DEPLOYER_SA_EMAIL: ${{ vars.GCP_FRONTEND_DEPLOYER_SA_EMAIL }}

    # ------------------------------------------------------------
    # Build frontend React/Vite app with API base URL baked at build-time,
    # upload to Cloud Storage Bucket, and invalidate CDN cache.
    # ------------------------------------------------------------
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA_EMAIL }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Load browser API configuration
        run: |
          firebase_api_key="$(gcloud secrets versions access latest \
            --secret=tripplanning-firebase-web-api-key \
            --project="${PROJECT_ID}")"
          google_maps_api_key="$(gcloud secrets versions access latest \
            --secret=tripplanning-google-maps-browser-api-key \
            --project="${PROJECT_ID}")"
          test -n "${firebase_api_key}" || {
            echo "Identity Platform returned an empty browser API key."
            exit 1
          }
          test -n "${google_maps_api_key}" || {
            echo "Google Maps returned an empty browser API key."
            exit 1
          }
          echo "::add-mask::${firebase_api_key}"
          echo "::add-mask::${google_maps_api_key}"
          echo "VITE_FIREBASE_API_KEY=${firebase_api_key}" >> "${GITHUB_ENV}"
          echo "VITE_FIREBASE_AUTH_DOMAIN=${PROJECT_ID}.firebaseapp.com" >> "${GITHUB_ENV}"
          echo "VITE_GOOGLE_MAPS_API_KEY=${google_maps_api_key}" >> "${GITHUB_ENV}"

      - name: Build frontend app
        env:
          VITE_API_BASE_URL: ${{ vars.GCP_FRONTEND_API_BASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          test -n "${VITE_FIREBASE_API_KEY}" || {
            echo "Missing required secret: TRIPPLANNING_FIREBASE_WEB_API_KEY"
            exit 1
          }
          test -n "${VITE_FIREBASE_AUTH_DOMAIN}" || {
            echo "Missing required variable: GCP_FIREBASE_AUTH_DOMAIN"
            exit 1
          }
          test -n "${VITE_FIREBASE_PROJECT_ID}" || {
            echo "Missing required variable: GCP_PROJECT_ID"
            exit 1
          }
          test -n "${VITE_GOOGLE_MAPS_API_KEY}" || {
            echo "Missing required Secret Manager value: tripplanning-google-maps-browser-api-key"
            exit 1
          }
          # Do not bake https://api.k8s.tbd-htwg.de — that subdomain is tooling-only and causes
          # cross-origin CORS failures in the browser. https://k8s.tbd-htwg.de is valid (same host as SPA).
          case "${VITE_API_BASE_URL}" in
            https://api.k8s.tbd-htwg.de|https://api.k8s.tbd-htwg.de/)
              echo "WARNING: GCP_FRONTEND_API_BASE_URL points at api.k8s.tbd-htwg.de; using same-origin /api/v2 instead."
              VITE_API_BASE_URL=""
              ;;
            *)
              echo "Using VITE_API_BASE_URL='${VITE_API_BASE_URL:-<same-origin /api/v2>}'"
              ;;
          esac
          echo "Effective VITE_API_BASE_URL='${VITE_API_BASE_URL:-<same-origin /api/v2>}'"
          {
            echo "VITE_API_BASE_URL=${VITE_API_BASE_URL}"
            echo "VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}"
            echo "VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}"
            echo "VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}"
            echo "VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}"
          } > .env.production
          npm run build

      - name: Upload files to Cloud Storage Bucket
        run: |
          gcloud storage rsync dist "gs://${FRONTEND_BUCKET}" --recursive
          gcloud storage objects update "gs://${FRONTEND_BUCKET}/index.html" \
            --cache-control="no-cache, max-age=0, must-revalidate"

      - name: Invalidate Cloud CDN Cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache "${URL_MAP_NAME}" --path="/*"
