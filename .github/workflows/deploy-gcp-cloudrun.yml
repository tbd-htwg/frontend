name: Deploy Frontend to Cloud Storage and CDN

on:
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        description: Select the environment to deploy to
        required: true
        default: 'develop'
  push:
    branches: ["main", "staging", "develop"]

############################################################################
# WORKFLOW PERMISSIONS AND GLOBAL VARIABLES
############################################################################

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || (github.ref == 'refs/heads/staging' && 'staging' || 'develop')) }}
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      BACKEND_SERVICE: ${{ vars.GCP_BACKEND_SERVICE }}

    # ------------------------------------------------------------
    # Build frontend React/Vite app with API base URL baked at build-time,
    # upload to Cloud Storage Bucket, and invalidate CDN cache.
    # ------------------------------------------------------------
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend app
        env:
          VITE_API_BASE_URL: ${{ vars.GCP_FRONTEND_API_BASE_URL }}
        run: |
          echo "Using VITE_API_BASE_URL='${{ vars.GCP_FRONTEND_API_BASE_URL }}'"
          echo "VITE_API_BASE_URL=${{ vars.GCP_FRONTEND_API_BASE_URL }}" > .env.production
          npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Upload files to Cloud Storage Bucket
        run: |
          APP_PREFIX="${BACKEND_SERVICE%-backend}"
          if [ "$APP_PREFIX" = "tripplanning" ]; then
            BUCKET_NAME="${PROJECT_ID}-frontend-bucket"
          else
            BUCKET_NAME="${PROJECT_ID}-${APP_PREFIX}-frontend"
          fi
          gcloud storage rsync dist "gs://${BUCKET_NAME}" --recursive

      - name: Invalidate Cloud CDN Cache
        run: |
          APP_PREFIX="${BACKEND_SERVICE%-backend}"
          URL_MAP_NAME="${APP_PREFIX}-lb"
          gcloud compute url-maps invalidate-cdn-cache "${URL_MAP_NAME}" --path="/*"
