name: Deploy Frontend to GCP Cloud Run

on:
  workflow_dispatch:
  push:
    branches: ["main"]

############################################################################
# WORKFLOW PERMISSIONS AND GLOBAL VARIABLES
############################################################################

permissions:
  contents: read
  id-token: write

env:
  REGION: ${{ vars.GCP_REGION }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPO }}
  SERVICE_NAME: ${{ vars.GCP_FRONTEND_SERVICE }}
  API_BASE_URL: ${{ vars.GCP_FRONTEND_API_BASE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ------------------------------------------------------------
    # Build frontend image with API base URL baked at build-time,
    # publish to Artifact Registry, then deploy to Cloud Run.
    # ------------------------------------------------------------
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      # Build frontend image and inject API base URL via Vite build arg.
      - name: Build and push frontend image
        env:
          IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/tripplanning-frontend:${{ github.sha }}
        run: |
            API_BASE_URL="${PAAS_BACKEND_URL%/}"
            if [[ "${API_BASE_URL}" != */api/v2 ]]; then
              API_BASE_URL="${API_BASE_URL}/api/v2"
            fi

          docker build \
            --build-arg "VITE_API_BASE_URL=${API_BASE_URL}" \
            -t "${IMAGE_URI}" \
            .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      # Deploy the frontend Cloud Run service.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE_URI}" \
            --region="${REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=80
