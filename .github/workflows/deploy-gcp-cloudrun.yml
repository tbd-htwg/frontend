name: Deploy Frontend to GCP Cloud Run

on:
  workflow_dispatch:
  push:
    branches: ["main"]

############################################################################
# WORKFLOW PERMISSIONS AND GLOBAL VARIABLES
############################################################################

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  API_BASE_URL: ${{ vars.GCP_FRONTEND_API_BASE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ------------------------------------------------------------
    # Build frontend React/Vite app with API base URL baked at build-time,
    # upload to Cloud Storage Bucket, and invalidate CDN cache.
    # ------------------------------------------------------------
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend app
        env:
          VITE_API_BASE_URL: ${{ vars.GCP_FRONTEND_API_BASE_URL }}
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload files to Cloud Storage Bucket
        run: |
          BUCKET_NAME="${PROJECT_ID}-frontend-bucket"
          gcloud storage rsync dist "gs://${BUCKET_NAME}" --recursive

      - name: Invalidate Cloud CDN Cache
        run: |
          FRONTEND_BACKEND_SERVICE="tripplanning-frontend-backend"
          gcloud compute backend-buckets invalidate-cache "${FRONTEND_BACKEND_SERVICE}" --path="/*"
